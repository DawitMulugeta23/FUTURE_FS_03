<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='0.9em' font-size='90'%3E☕%3C/text%3E%3C/svg%3E"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yesekela Café</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      const originalError = console.error;
      console.error = function (...args) {
        if ((message = args[0]?.toString() || "")) {
          if (
            message.includes("Warning: validateDOMNesting") ||
            message.includes(
              "Warning: Each child in a list should have a unique 'key' prop",
            ) ||
            message.includes("Warning: Failed prop type") ||
            message.includes(
              "Warning: React does not recognize the `isAdmin` prop on a DOM element",
            )
          ) {
            return;
          }
        }
        originalError.apply(console, args);
      };
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
